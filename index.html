const HOLES = 18;
const DEFAULT_PARS = [4,4,3,5,4,4,3,4,5,4,4,3,5,4,4,3,4,5];
const genId = () => Math.random().toString(36).slice(2, 10);

const hcpStrokes = (hcp, hole) => {
  const order = [0,2,4,6,8,10,12,14,16,1,3,5,7,9,11,13,15,17];
  const rank = order.indexOf(hole);
  if (hcp >= 18 + rank + 1) return 2;
  if (hcp >= rank + 1) return 1;
  return 0;
};

const bestBall = (team, scores, hole, hcps, pars) => {
  if (!team || !team.players || !team.players.length) return null;
  var nets = [];
  for (var i = 0; i < team.players.length; i++) {
    var p = team.players[i];
    var raw = scores && scores[p.id] ? scores[p.id][hole] : undefined;
    if (raw == null) continue;
    nets.push(raw - hcpStrokes(hcps && hcps[p.id] ? hcps[p.id] : 0, hole));
  }
  return nets.length ? Math.min.apply(null, nets) : null;
};

const teamTotal = (team, scores, hcps, pars, thru) => {
  var total = 0, played = 0;
  for (var i = 0; i < (thru != null ? thru : HOLES); i++) {
    var b = bestBall(team, scores, i, hcps, pars);
    if (b !== null) { total += b; played++; }
  }
  return { total: total, played: played };
};

const teamVsPar = (team, scores, hcps, pars) => {
  var vp = 0, played = 0;
  for (var i = 0; i < HOLES; i++) {
    var b = bestBall(team, scores, i, hcps, pars);
    if (b !== null) { vp += (b - pars[i]); played++; }
  }
  return { vp: vp, played: played };
};

  ]);
  var teams = teamsState[0]; var setTeams = teamsState[1];
  var hcpsState = useState({});
  var hcps = hcpsState[0]; var setHcps = hcpsState[1];
  var parsState = useState(DEFAULT_PARS.slice());
  var pars = parsState[0]; var setPars = parsState[1];
  var showPState = useState(false);

  var stepState = useState(0);

  var updTc = function(n) {

      while (next.length < n) next.push({ name: 'Team '+(next.length+1), players:[{ id:genId(), name:'' }] });
      return next.slice(0, n);

  var addP = function(ti) { setTeams(function(prev) { return prev.map(function(t,i) { return i===ti ? Object.assign({}, t, { players: t.players.concat([{ id:genId(), name:'' }]) }) : t; }); }); };
  var rmP = function(ti,pi) { setTeams(function(prev) { return prev.map(function(t,i) { return i===ti ? Object.assign({}, t, { players: t.players.filter(function(_,j){return j!==pi;}) }) : t; }); }); };
  var updP = function(ti,pi,v) { setTeams(function(prev) { return prev.map(function(t,i) { return i===ti ? Object.assign({}, t, { players: t.players.map(function(p,j){return j===pi?Object.assign({},p,{name:v}):p;}) }) : t; }); }); };
  var updTN = function(ti,v) { setTeams(function(prev) { return prev.map(function(t,i) { return i===ti ? Object.assign({}, t, { name:v }) : t; }); }); };
  var updH = function(pid,v) { setHcps(function(prev) { var n = Object.assign({}, prev); n[pid] = parseInt(v)||0; return n; }); };

        );

    )
  );

  if (step === 0) {
    content.push(h('div', { key:'s0' },
      h('h2', { style: S.secTitle }, 'Event Details'),
      h('label', { style: S.label }, 'Event Name'),
      h('input', { style: S.input, placeholder: 'e.g. "Spring Classic"', value: name, onChange: function(e){setName(e.target.value);} }),

      h('div', { style: S.togRow },
        h('button', { style: fmt==='bestball'?S.togAct:S.tog, onClick:function(){setFmt('bestball');} }, 'Best Ball'),
        h('button', { style: fmt==='scramble'?S.togAct:S.tog, onClick:function(){setFmt('scramble');} }, 'Scramble')
      ),
      h('p', { style: S.hint }, fmt==='bestball' ? 'Each player plays their own ball \u2014 lowest net score per hole counts.' : 'Team plays one ball \u2014 best drive, then all play from that spot.'),
      h('label', { style: Object.assign({}, S.label, { marginTop:20 }) }, 'Number of Teams'),
      h('div', { style: S.togRow },
        [2,3,4].map(function(n) { return h('button', { key:n, style: tc===n?S.togAct:S.tog, onClick:function(){updTc(n);} }, n); })
      ),
      h('button', { style: Object.assign({}, S.btnP, { marginTop:32 }), onClick:function(){setStep(1);} }, 'Next \u2192')
    ));
  }

  if (step === 1) {
    var teamCards = teams.map(function(team, ti) {
      var playerRows = team.players.map(function(p, pi) {
        var els = [
          h('input', { key:'n', style: Object.assign({}, S.input, { flex:1, marginBottom:0 }), placeholder:'Player '+(pi+1), value:p.name, onChange:function(e){updP(ti,pi,e.target.value);} }),
          h('input', { key:'h', style: S.hcpIn, type:'number', placeholder:'HCP', value:hcps[p.id]||'', onChange:function(e){updH(p.id,e.target.value);} })
        ];
        if (team.players.length > 1) els.push(h('button', { key:'r', style: S.rmBtn, onClick:function(){rmP(ti,pi);} }, '\u2715'));
        return h('div', { key:p.id, style: S.pRow }, els);
      });
      return h('div', { key:ti, style: S.tCard },
        h('input', { style: S.tNameIn, value: team.name, onChange: function(e){updTN(ti,e.target.value);}, placeholder:'Team '+(ti+1) }),
        playerRows,
        h('button', { style: S.addP, onClick:function(){addP(ti);} }, '+ Add Player')
      );
    });
    content.push(h('div', { key:'s1' },
      h('h2', { style: S.secTitle }, 'Teams & Players'),
      teamCards,
      h('button', { style: Object.assign({}, S.btnP, { marginTop:24 }), onClick:function(){setStep(2);} }, 'Next \u2192')
    ));
  }

  if (step === 2) {
    var parEls = [];
    if (showP) {
      parEls.push(h('div', { key:'pg', style: S.parGrid },
        pars.map(function(p, i) {
          return h('div', { key:i, style: S.parCell },
            h('span', { style: S.parHNum }, i+1),
            h('div', { style: S.parStep },
              h('button', { style: S.parStBtn, onClick:function(){setPars(function(prev){var n=prev.slice();n[i]=Math.max(3,n[i]-1);return n;});} }, '\u2212'),
              h('span', { style: S.parV }, p),
              h('button', { style: S.parStBtn, onClick:function(){setPars(function(prev){var n=prev.slice();n[i]=Math.min(6,n[i]+1);return n;});} }, '+')
            )
          );
        })
      ));
    }
    content.push(h('div', { key:'s2' },
      h('h2', { style: S.secTitle }, 'Course Setup'),
      h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' } },
        h('p', { style: S.label }, 'Par per hole (default: 72)'),
        h('button', { style: S.smBtn, onClick:function(){setShowP(!showP);} }, showP?'Hide':'Edit')
      ),
      parEls,
      h('div', { style: Object.assign({}, S.sumBox, { marginTop:24 }) },
        h('div',{style:S.sumRow}, h('span',null,'Total Par'), h('span',{style:S.sumVal},pars.reduce(function(a,b){return a+b;},0))),
        h('div',{style:S.sumRow}, h('span',null,'Front 9'), h('span',{style:S.sumVal},pars.slice(0,9).reduce(function(a,b){return a+b;},0))),
        h('div',{style:S.sumRow}, h('span',null,'Back 9'), h('span',{style:S.sumVal},pars.slice(9).reduce(function(a,b){return a+b;},0)))
      ),
      h('button', { style: Object.assign({}, S.btnP, { marginTop:32 }), onClick:go }, '\u26F3 Start Event')
    ));
  }

  return h('div', { style: S.screen },
    h('button', { style: S.back, onClick: step > 0 ? function(){setStep(step-1);} : props.onBack }, '\u2190 Back'),
    h('div', { style: { marginTop:60, padding:'0 20px', paddingBottom:100 } }, content)
  );
}

// ─── Scoring ─────────────────────────────────────
function Scoring(props) {
  var event = props.event, scores = props.scores, pars = props.pars, teams = props.teams, hcps = props.hcps, fmt = props.fmt;
  var holeState = useState(0);
  var hole = holeState[0]; var setHole = holeState[1];
  var myTState = useState(0);
  var myT = myTState[0]; var setMyT = myTState[1];
  var shState = useState(false);
  var showSh = shState[0]; var setShowSh = shState[1];
  var team = teams[myT];

  var els = [];

  // Header
  els.push(h('div', { key:'hd', style: S.sHead },
    h('button', { style: S.iBtn, onClick: props.onHome }, '\u2715'),
    h('div', { style: { textAlign:'center' } },
      h('div', { style: S.evSm }, event.name),
      h('div', { style: S.fmtBdg }, fmt==='bestball'?'Best Ball':'Scramble')
    ),
    h('button', { style: S.iBtn, onClick:function(){setShowSh(!showSh);} }, '\uD83D\uDCE4')
  ));

  // Share
  if (showSh) {
    els.push(h('div', { key:'sh', style: S.shareMod },
      h('div', { style: S.shareCon },
        h('p', { style: Object.assign({}, S.label, { marginBottom:4 }) }, 'Share this code with friends:'),
        h('div', { style: S.codeDis, onClick:function(){ try{navigator.clipboard.writeText(event.id);}catch(e){} } }, event.id),
        h('p', { style: S.hint }, 'Tap the code to copy'),
        h('button', { style: Object.assign({}, S.btnS, { marginTop:12 }), onClick:function(){setShowSh(false);} }, 'Done')
      )
    ));
  }

  // Team tabs
  els.push(h('div', { key:'tt', style: S.tTabs },
    teams.map(function(t,i) {
      return h('button', { key:i, style: i===myT?S.tTabA:S.tTab, onClick:function(){setMyT(i);} }, t.name);
    })
  ));

  // Hole strip
  els.push(h('div', { key:'hs', style: S.hStrip },
    Array.from({length:HOLES}, function(_,i) {
      var has = bestBall(team,scores,i,hcps,pars) !== null;
      var st = Object.assign({}, S.hBtn);
      if (i===hole) Object.assign(st, S.hBtnA);
      if (has) Object.assign(st, S.hBtnS);
      return h('button', { key:i, style:st, onClick:function(){setHole(i);} }, i+1);
    })
  ));

  // Hole detail
  var detEls = [];
  detEls.push(h('div', { key:'hh', style: S.hHead },
    h('span', { style: S.hNum }, 'Hole '+(hole+1)),
    h('span', { style: S.hPar }, 'Par '+pars[hole])
  ));

  if (team && team.players) {
    team.players.forEach(function(player) {
      var raw = scores && scores[player.id] ? scores[player.id][hole] : undefined;
      var hcp = hcps && hcps[player.id] ? hcps[player.id] : 0;
      var str = hcpStrokes(hcp, hole);
      var net = raw!=null ? raw-str : null;
      var vpn = net!=null ? net-pars[hole] : null;
      var scoreEls = [
        h('button', { key:'m', style: S.sBtn, onClick:function(){props.updateScore(player.id,hole,Math.max(1,(raw||pars[hole])-1));} }, '\u2212'),
        h('div', { key:'d', style: S.sDis },
          h('span', { style: Object.assign({}, S.sNum, { color: vpn!=null?(vpn<0?'#2ECC40':vpn>0?'#FF4136':'#fff'):'#555' }) }, raw != null ? raw : '\u2014'),
          net!=null && str>0 ? h('span', { style: S.netL }, 'net '+net) : null
        ),
        h('button', { key:'p', style: S.sBtn, onClick:function(){props.updateScore(player.id,hole,Math.min(15,(raw||pars[hole])+1));} }, '+')
      ];
      var infoEls = [h('span', { key:'n', style: S.pName }, player.name)];
      if (hcp > 0) infoEls.push(h('span', { key:'h', style: S.hcpBdg }, 'HCP '+hcp+(str>0?' ('+str+' dot'+(str>1?'s':'')+')':'')));
      detEls.push(h('div', { key:player.id, style: S.psc },
        h('div', { style: S.pInfo }, infoEls),
        h('div', { style: S.sCon }, scoreEls)
      ));
    });
  }

  // Best ball result
  var bb = bestBall(team,scores,hole,hcps,pars);
  if (bb !== null) {
    var diff = bb - pars[hole];
    var lbl = diff===-3?'Albatross!':diff===-2?'Eagle!':diff===-1?'Birdie!':diff===0?'Par':diff===1?'Bogey':diff===2?'Double':'+'+diff;
    detEls.push(h('div', { key:'bb', style: S.bbRes },
      h('span', { style: S.bbLab }, 'Team Best Ball'),
      h('span', { style: Object.assign({}, S.bbScr, { color:diff<0?'#2ECC40':diff>0?'#FF4136':'#ccc' }) }, lbl+' ('+bb+')')
    ));
  }

  els.push(h('div', { key:'det', style: S.hDet }, detEls));

  // Nav
  els.push(h('div', { key:'nav', style: S.hNav },
    h('button', { style: Object.assign({}, S.btnS, { flex:1, opacity:hole===0?.3:1, padding:'14px 8px' }), disabled:hole===0, onClick:function(){setHole(hole-1);} }, '\u2190 Prev'),
    h('button', { style: Object.assign({}, S.btnP, { flex:1.5, padding:'14px 8px' }), onClick:props.onLb }, '\uD83C\uDFC6 Board'),
    h('button', { style: Object.assign({}, S.btnS, { flex:1, opacity:hole===17?.3:1, padding:'14px 8px' }), disabled:hole===17, onClick:function(){setHole(hole+1);} }, 'Next \u2192')
  ));

  if (props.lastSync) {
    els.push(h('div', { key:'sync', style: S.sync },
      h('div', { style: S.syncD }),
      'Live \u00B7 synced '+props.lastSync.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    ));
  }

  return h('div', { style: S.screen }, els);
}

// ─── Leaderboard ─────────────────────────────────
function Leaderboard(props) {
  var event = props.event, scores = props.scores, pars = props.pars, teams = props.teams, hcps = props.hcps, fmt = props.fmt;

  var standings = teams.map(function(team,idx) {
    var vp = teamVsPar(team,scores,hcps,pars);
    var tot = teamTotal(team,scores,hcps,pars);
    return { team:team, idx:idx, vp:vp.vp, played:vp.played, total:tot.total };
  }).sort(function(a,b) { return a.vp - b.vp; });

  var tp = pars.reduce(function(a,b){return a+b;},0);

  var mkSC = function(start, count, label) {
    var headCells = [h('th', { key:'l', style: S.scTh }, 'Hole')];
    for (var i = 0; i < count; i++) headCells.push(h('th', { key:i, style: S.scTh }, start+i+1));
    headCells.push(h('th', { key:'t', style: Object.assign({}, S.scTh, { background:'#1a2e1a' }) }, label));

    var parCells = [h('td', { key:'l', style: S.scTdL }, 'Par')];
    for (var i = 0; i < count; i++) parCells.push(h('td', { key:i, style: S.scTd }, pars[start+i]));
    parCells.push(h('td', { key:'t', style: Object.assign({}, S.scTd, { fontWeight:700, background:'#1a2e1a' }) }, pars.slice(start,start+count).reduce(function(a,b){return a+b;},0)));

    var rows = [h('tr', { key:'par' }, parCells)];
    standings.forEach(function(s) {
      var t9=0, t9h=0;
      for(var hh=start;hh<start+count;hh++){var bv=bestBall(s.team,scores,hh,hcps,pars);if(bv!==null){t9+=bv;t9h++;}}
      var cells = [h('td', { key:'l', style: S.scTdL }, s.team.name)];
      for (var i = 0; i < count; i++) {
        var bv = bestBall(s.team,scores,start+i,hcps,pars);
        var d = bv!==null?bv-pars[start+i]:null;
        cells.push(h('td', { key:i, style: Object.assign({}, S.scTd, { color:d===null?'#555':d<0?'#2ECC40':d>0?'#FF4136':'#ccc' }) }, bv!=null?bv:'\u00B7'));
      }
      cells.push(h('td', { key:'t', style: Object.assign({}, S.scTd, { fontWeight:700, background:'#1a2e1a' }) }, t9h>0?t9:'\u00B7'));
      rows.push(h('tr', { key:s.idx }, cells));
    });

    return h('div', { style: Object.assign({}, S.scWrap, { marginTop: start===0?0:8 }) },
      h('table', { style: S.scTbl },
        h('thead', null, h('tr', null, headCells)),
        h('tbody', null, rows)
      )
    );
  };

  var cards = standings.map(function(s, rank) {
    return h('div', { key:s.idx, style: Object.assign({}, S.lbC, rank===0?S.lbC1:{}) },
      h('div', { style: S.lbR }, rank===0?'\uD83C\uDFC6':rank+1),
      h('div', { style: S.lbTI },
        h('span', { style: S.lbTN }, s.team.name),
        h('span', { style: S.lbPl }, s.team.players.map(function(p){return p.name;}).join(', ')),
        h('span', { style: S.lbTh }, 'Thru '+s.played)
      ),
      h('div', { style: S.lbSB },
        h('span', { style: Object.assign({}, S.lbVP, { color:s.vp<0?'#2ECC40':s.vp>0?'#FF4136':'#fff' }) }, fmtVp(s.vp)),
        h('span', { style: S.lbTo }, s.total)
      )
    );
  });

  return h('div', { style: S.screen },
    h('div', { style: S.lbH },
      h('button', { style: S.back, onClick: props.onBack }, '\u2190 Scoring'),
      h('h2', { style: Object.assign({}, S.secTitle, { margin:0, textAlign:'center', flex:1 }) }, 'Leaderboard'),
      h('div', { style: { width:80 } })
    ),
    h('div', { style: { padding:'0 16px', marginTop:80 } },
      h('div', { style: S.evBan },
        h('span', { style: S.evBanN }, event.name),
        h('span', { style: S.evBanF }, (fmt==='bestball'?'Best Ball':'Scramble')+' \u00B7 Par '+tp)
      ),
      cards,
      h('h3', { style: Object.assign({}, S.secTitle, { fontSize:16, marginTop:32 }) }, 'Hole-by-Hole'),
      mkSC(0, 9, 'OUT'),
      mkSC(9, 9, 'IN')
    ),
    h('div', { style: { height:60 } })
  );
}

// ─── App ─────────────────────────────────────────
function App() {
  var viewState = useState('home');
  var view = viewState[0]; var setView = viewState[1];
  var eventState = useState(null);
  var event = eventState[0]; var setEvent = eventState[1];
  var scoresState = useState({});
  var scores = scoresState[0]; var setScores = scoresState[1];
  var syncState = useState(null);
  var lastSync = syncState[0]; var setLastSync = syncState[1];
  var toastState = useState(null);
  var toast = toastState[0]; var setToast = toastState[1];
  var unsubRef = useRef(null);

  var showToast = useCallback(function(msg) { setToast(msg); setTimeout(function(){setToast(null);}, 2500); }, []);
  var cleanup = useCallback(function() { if(unsubRef.current){unsubRef.current();unsubRef.current=null;} }, []);

  useEffect(function() { return cleanup; }, [cleanup]);

  var subscribe = useCallback(function(id) {
    cleanup();
    unsubRef.current = storage.onScoresChange(id, function(sc) { setScores(sc||{}); setLastSync(new Date()); });
  }, [cleanup]);

  var createEvent = useCallback(function(data) {
    var evt = Object.assign({ id:genId(), createdAt:Date.now() }, data);
    storage.setEvent(evt.id, evt).then(function() {
      return storage.setScores(evt.id, {});
    }).then(function() {
      setEvent(evt); setScores({}); subscribe(evt.id); setView('scoring');
      showToast('Event created! Share code: '+evt.id);
    }).catch(function(e) { showToast('Error creating event'); console.error(e); });
  }, [subscribe, showToast]);

  var joinEvent = useCallback(function(code) {
    var c = code.trim();
    if(!c) return;
    storage.getEvent(c).then(function(evt) {
      if(!evt) { showToast('Event not found'); return; }
      return storage.getScores(c).then(function(sc) {
        setEvent(evt); setScores(sc||{}); subscribe(evt.id); setView('scoring');
        showToast('Joined: '+evt.name);
      });
    }).catch(function(e) { showToast('Error joining'); console.error(e); });
  }, [subscribe, showToast]);

  var updateScore = useCallback(function(pid, hole, val) {
    var next = Object.assign({}, scores);
    next[pid] = Object.assign({}, next[pid] || {});
    next[pid][hole] = val;
    setScores(next);
    if(event) storage.setScores(event.id, next).catch(function(e){console.error(e);});
  }, [scores, event]);

  var p = event ? (event.pars || DEFAULT_PARS) : DEFAULT_PARS;
  var t = event ? (event.teams || []) : [];
  var hc = event ? (event.handicaps || {}) : {};
  var f = event ? (event.format || 'bestball') : 'bestball';

  var children = [];
  if (toast) children.push(h('div', { key:'toast', style: S.toast }, toast));
  if (view==='home') children.push(h(Home, { key:'home', onNew:function(){setView('setup');}, onJoin:function(){setView('join');} }));
  if (view==='join') children.push(h(Join, { key:'join', onJoin:joinEvent, onBack:function(){setView('home');} }));
  if (view==='setup') children.push(h(Setup, { key:'setup', onCreate:createEvent, onBack:function(){setView('home');} }));
  if (view==='scoring' && event) children.push(h(Scoring, { key:'scoring', event:event, scores:scores, pars:p, teams:t, hcps:hc, fmt:f, updateScore:updateScore, onLb:function(){setView('leaderboard');}, onHome:function(){cleanup();setView('home');}, lastSync:lastSync }));
  if (view==='leaderboard' && event) children.push(h(Leaderboard, { key:'lb', event:event, scores:scores, pars:p, teams:t, hcps:hc, fmt:f, onBack:function(){setView('scoring');} }));

  return h('div', { style: S.app }, children);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
